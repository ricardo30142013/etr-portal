<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | ETR La Vega</title>

    <link rel="stylesheet" href="assets/css/style.css">

    <style>

        body{

            margin:0;
            background:#111;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family:Poppins,sans-serif;

        }

        .login{

            width:420px;
            background:#1b1b1b;
            padding:40px;
            border-radius:15px;
            box-shadow:0 0 30px rgba(0,0,0,.5);
            text-align:center;

        }

        .login img{

            width:110px;
            margin-bottom:20px;

        }

        h2{

            color:white;
            margin-bottom:30px;

        }

        input{

            width:100%;
            padding:15px;
            margin-bottom:15px;
            border:none;
            border-radius:8px;
            font-size:16px;

        }

        button{

            width:100%;
            padding:15px;
            background:#d10000;
            color:white;
            border:none;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;

        }

        button:hover{

            background:#b00000;

        }

    </style>

</head>

<body>

<div class="login">

    <img src="assets/img/dddss.png">

    <h2>Iniciar Sesión</h2>

    <form id="loginForm">

        <input
            type="text"
            id="usuario"
            placeholder="Usuario"
            required>

        <input
            type="password"
            id="password"
            placeholder="Contraseña"
            required>

        <button type="submit">

            Entrar

        </button>

    </form>

</div>

<script>

const form = document.getElementById("loginForm");

form.addEventListener("submit", async function(e){

    e.preventDefault();

    const usuario = document.getElementById("usuario").value;

    const password = document.getElementById("password").value;

    const respuesta = await fetch("/api/login",{

        method:"POST",

        headers:{

            "Content-Type":"application/json"

        },

        body:JSON.stringify({

            usuario,

            password

        })

    });

    const datos = await respuesta.json();

    if (datos.success) {

    alert("Conectado correctamente");

    window.location.href = "/dashboard/";

} else {

    console.log(datos);

    alert(datos.mensaje);

}

});

</script>

</body>
</html>
