<div class="miembros-container">

    <div class="cabecera-miembros">

        <h2>Gestión de Miembros</h2>

        <button id="btnNuevoMiembro" class="btn-rojo">
            ➕ Nuevo Miembro
        </button>

    </div>

    <div class="barra-busqueda">

        <input
            type="text"
            id="buscarMiembro"
            placeholder="Buscar por nombre, apellido o cédula...">

    </div>

    <table class="tabla-miembros">

        <thead>

            <tr>

                <th>Foto</th>

                <th>Nombre</th>

                <th>Cédula</th>

                <th>Rango</th>

                <th>Unidad</th>

                <th>Estado</th>

                <th>Acciones</th>

            </tr>

        </thead>

        <tbody id="tablaMiembros">

        </tbody>

    </table>

</div>


<div id="modalMiembro" class="modal oculto">

<div class="modal-contenido grande">

<h2>Registro de Miembro</h2>

<hr>

<h3>Información Personal</h3>

<div class="foto-centro">

<img
id="previewFoto"
src="../assets/img/dddss.png">

<input
type="file"
id="fotoMiembro"
accept="image/*">

</div>

<div class="grid">

<input id="nombre" placeholder="Nombres">

<input id="apellidos" placeholder="Apellidos">

<input id="cedula" placeholder="Cédula">

<input type="date" id="fecha_nacimiento">

<select id="sexo">

<option value="">Sexo</option>

<option>Masculino</option>

<option>Femenino</option>

</select>

<select id="tipo_sangre">

<option value="">Tipo de Sangre</option>

<option>O+</option>

<option>O-</option>

<option>A+</option>

<option>A-</option>

<option>B+</option>

<option>B-</option>

<option>AB+</option>

<option>AB-</option>

</select>

<input id="telefono" placeholder="Teléfono">

<input id="correo" placeholder="Correo">

<textarea
id="direccion"
placeholder="Dirección"></textarea>

</div>

<hr>

<h3>Información Institucional</h3>

<div class="grid">

<select id="rango">

<option value="">Rango</option>

<option>Comandante</option>

<option>Subcomandante</option>

<option>Mayor</option>

<option>Capitán</option>

<option>Teniente</option>

<option>Sargento</option>

<option>Cabo</option>

<option>Rescatista</option>

</select>

<select id="unidad">

<option value="">Unidad</option>

<option>Búsqueda y Rescate</option>

<option>Rescate Vertical</option>

<option>Rescate Acuático</option>

<option>Paramédicos</option>

<option>Logística</option>

<option>Operaciones</option>

<option>Comunicaciones</option>

<option>Administración</option>

</select>

<select id="estado">

<option>ACTIVO</option>

<option>INACTIVO</option>

<option>SUSPENDIDO</option>

<option>PERMISO</option>

</select>

</div>

<hr>

<h3>Contacto de Emergencia</h3>

<div class="grid">

<input
id="contacto_emergencia"
placeholder="Nombre del contacto">

<input
id="telefono_emergencia"
placeholder="Teléfono de emergencia">

</div>

<hr>

<h3>Observaciones</h3>

<textarea
id="observaciones"
placeholder="Observaciones"></textarea>

<div class="acciones">

<button id="btnCancelar">

Cancelar

</button>

<button id="btnGuardar">

Guardar Miembro

</button>

</div>

</div>

</div>
